name: Deploy frontend to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          VITE_ORDER_API_URL: https://barretos-custom-studio-production.up.railway.app/api/orders
        run: npm run build

      - name: Deploy via SCP (upload only, no deletes)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          source: "dist/*"
          target: "/home/u694896384/domains/barretosconfeccao.com.br/public_html/"
          strip_components: 1
          overwrite: true

      - name: Mirror to subdomain app/
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          script: |
            set -e
            ROOT=/home/u694896384/domains/barretosconfeccao.com.br/public_html
            cp -f $ROOT/index.html $ROOT/app/index.html
            cp -rf $ROOT/assets/. $ROOT/app/assets/
            cp -f $ROOT/favicon.png $ROOT/app/favicon.png 2>/dev/null || true
            cp -f $ROOT/robots.txt $ROOT/app/robots.txt 2>/dev/null || true
            cp -f $ROOT/sitemap.xml $ROOT/app/sitemap.xml 2>/dev/null || true
            cp -f $ROOT/placeholder.svg $ROOT/app/placeholder.svg 2>/dev/null || true
            echo "Mirror to app/ done"
